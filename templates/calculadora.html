<!DOCTYPE html>
<html>
<head>
    <title>Calculadora de Frete</title>
</head>
<body>

<h1>Calculadora de Frete</h1>

<form method="POST">

<label>Distância da rota (km)</label><br>
<input type="number" name="km" required><br><br>

<label>Valor do frete (R$)</label><br>
<input type="number" name="valor_frete" step="0.01" required><br><br>

<label>Consumo do caminhão (km por litro)</label><br>
<input type="number" name="consumo" step="0.01" required><br><br>

<label>Preço do diesel (R$)</label><br>
<input type="number" name="preco_combustivel" step="0.01" required><br><br>

<label>Pedágio total (R$)</label><br>
<input type="number" name="pedagio" step="0.01" required><br><br>

<button type="submit">Calcular</button>

</form>

</body>
</html>
