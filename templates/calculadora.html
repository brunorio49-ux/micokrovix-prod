<!DOCTYPE html>
<html>
<head>
<title>Micokrovix - Calculadora de Frete</title>
</head>

<body>

<h1>Calculadora de Frete</h1>

<form method="POST">

<label>Distância da rota (km)</label><br>
<input type="number" name="km" required>
<br><br>

<label>Valor do frete (R$)</label><br>
<input type="number" step="0.01" name="valor_frete" required>
<br><br>

<label>Consumo do caminhão (km por litro)</label><br>
<input type="number" step="0.1" name="consumo" required>
<br><br>

<label>Preço do diesel (R$)</label><br>
<input type="number" step="0.01" name="preco_combustivel" required>
<br><br>

<label>Pedágio total da viagem (R$)</label><br>
<input type="number" step="0.01" name="pedagio" required>
<br><br>

<button type="submit">Calcular</button>

</form>

</body>
</html>
