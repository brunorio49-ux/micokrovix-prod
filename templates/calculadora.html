<!DOCTYPE html>
<html>
<head>
<title>Micokrovix - Calculadora</title>
</head>

<body>

<h1>Calculadora de Frete</h1>

<form method="POST">

Distância (km)<br>
<input type="number" name="km" required><br><br>

Valor do frete (R$)<br>
<input type="number" name="valor_frete" required><br><br>

Consumo do veículo (km/l)<br>
<input type="number" step="0.1" name="consumo" required><br><br>

Preço do combustível (R$)<br>
<input type="number" step="0.01" name="preco_combustivel" required><br><br>

Pedágio total (R$)<br>
<input type="number" name="pedagio" required><br><br>

<button type="submit">Calcular</button>

</form>

<br>
<a href="/dashboard">Voltar</a>

</body>
</html>
