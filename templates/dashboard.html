!DOCTYPE html><html><head><title>Dashboard</title></head><body>
<h1>Micokrovix Dashboard {{ session.email }}</h1>
<form method="POST" action="/add_task">
{{ form.hidden_tag() }}
{{ form.titulo.label }} {{ form.titulo }}<br>
{{ form.submit }}
</form>
<h3>Tarefas:</h3>
<ul>{% for task in tasks %}<li>{{ task.titulo }} - {{ task.status }}</li>{% endfor %}</ul>
<a href="/logout">Logout</a>
</body></html>
