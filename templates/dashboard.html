<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Micokrovix Dashboard</title>

    <!-- CSS PROFISSIONAL -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Gráfico -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

    <h1>🚛 Micokrovix</h1>

    <div class="task-form" style="justify-content: center;">
        <strong>Painel de controle</strong>
    </div>

    <div class="task-list">

        <div class="task-item">
            <span class="task-info">Fretes calculados</span>
            <strong>{{ total_fretes }}</strong>
        </div>

        <div class="task-item">
            <span class="task-info">Diesel total</span>
            <strong>R$ {{ diesel_total }}</strong>
        </div>

        <div class="task-item">
            <span class="task-info">Pedágio total</span>
            <strong>R$ {{ pedagio_total }}</strong>
        </div>

        <div class="task-item">
            <span class="task-info">Lucro médio</span>
            <strong>R$ {{ lucro_medio }}</strong>
        </div>

    </div>

    <h3 style="margin-top: 2rem;">📊 Lucro por Frete</h3>

    <canvas id="graficoLucro"></canvas>

    <div style="margin-top: 2rem; text-align:center;">
        <a href="/calculadora" class="logout-link">Nova simulação</a><br><br>
        <a href="/historico" class="logout-link">Ver histórico</a>
    </div>

</div>

<script>
const ctx = document.getElementById('graficoLucro');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: {{ labels|safe }},
        datasets: [{
            label: 'Lucro por Frete',
            data: {{ valores|safe }},
            borderWidth: 1
        }]
    },
    options: {
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});
</script>

</body>
</html>
