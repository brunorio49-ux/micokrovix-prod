<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micokrovix</title>

<style>
body { background:#0A0C0F; color:white; font-family:sans-serif; padding:20px; }
input, button { width:100%; padding:12px; margin-top:10px; border-radius:8px; border:none; }
button { background:#00E577; font-weight:bold; }
.card { background:#111418; padding:15px; border-radius:10px; margin-bottom:15px; }
</style>

</head>
<body>

<div class="card">
<h2>MICOKROVIX</h2>
<span id="user-email">Offline</span>
<button onclick="logout()">SAIR</button>
</div>

<div id="auth">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="signup()">Criar conta</button>
</div>

<div id="app" style="display:none">
<div class="card">
<p>Total: <span id="total">R$0</span></p>
<p>Viagens: <span id="count">0</span></p>
</div>

<div class="card">
<input id="origem" placeholder="Origem">
<input id="destino" placeholder="Destino">
<input id="valor" placeholder="Valor">
<button onclick="salvar()">Salvar</button>
</div>

<div id="lista"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const config = {
apiKey: "AIzaSyDqLzl2V5r5zOhB8L2TBgW2Li-aC4wkROg",
authDomain: "micokrovix.firebaseapp.com",
projectId: "micokrovix",
storageBucket: "micokrovix.firebasestorage.app",
messagingSenderId: "228115422782",
appId: "1:228115422782:web:eb3c47c7f5dce6e817fb6f"
};

const app = initializeApp(config);
const db = getFirestore(app);
const auth = getAuth(app);

let unsub = null;

onAuthStateChanged(auth, user=>{
if(user){
document.getElementById("auth").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("user-email").innerText=user.email;
sync(user.uid);
}else{
document.getElementById("auth").style.display="block";
document.getElementById("app").style.display="none";
}
});

window.login=()=>signInWithEmailAndPassword(auth,email.value,pass.value);
window.signup=()=>createUserWithEmailAndPassword(auth,email.value,pass.value);
window.logout=()=>signOut(auth);

function sync(uid){
if(unsub)unsub();
const q=query(collection(db,`usuarios/${uid}/viagens`),orderBy("data","desc"));
unsub=onSnapshot(q,s=>{
let total=0,count=0;
lista.innerHTML="";
s.forEach(d=>{
const v=d.data();
total+=v.valor;
count++;
lista.innerHTML+=`<p>${v.origem} → ${v.destino} | R$${v.valor}</p>`;
});
totalEl.innerText="R$"+total;
countEl.innerText=count;
});
}

window.salvar=async ()=>{
const user=auth.currentUser;
if(!user)return;

const v=parseFloat(valor.value.replace(",","."));
if(isNaN(v)||v<=0)return;

await addDoc(collection(db,`usuarios/${user.uid}/viagens`),{
origem:origem.value,
destino:destino.value,
valor:v,
data:new Date().toISOString()
});

valor.value="";
};

const totalEl=document.getElementById("total");
const countEl=document.getElementById("count");
const lista=document.getElementById("lista");

</script>

</body>
</html>
